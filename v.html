<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',sans-serif;background:#F4F2FB;color:#160B33;-webkit-font-smoothing:antialiased}
  a{text-decoration:none;color:inherit}
</style>
</helmet>
<div style="min-height:100vh;padding:64px 24px">
  <div style="max-width:1080px;margin:0 auto">
    <span style="display:inline-block;font-size:13px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#5B47E0">Wikibot Pulse</span>
    <h1 style="font-family:'Space Grotesk',sans-serif;font-size:44px;font-weight:700;letter-spacing:-.02em;margin:14px 0 10px">Три варианта лендинга</h1>
    <p style="color:#5C5476;font-size:17px;max-width:620px">Один и тот же текст — три визуальных направления. Откройте любой, чтобы посмотреть страницу целиком.</p>

    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:44px">
      <sc-for list="{{ variants }}" as="v" hint-placeholder-count="3">
        <a href="{{ v.href }}" style="display:block;background:#fff;border:1px solid #E7E3F5;border-radius:20px;overflow:hidden;box-shadow:0 14px 40px rgba(45,11,90,.06)" style-hover="transform:translateY(-4px);box-shadow:0 22px 54px rgba(45,11,90,.14)">
          <div style="height:150px;background:{{ v.swatch }};display:flex;align-items:flex-end;padding:18px">
            <span style="font-family:'Space Grotesk',sans-serif;font-size:52px;font-weight:700;color:{{ v.letterColor }};line-height:.8">{{ v.letter }}</span>
          </div>
          <div style="padding:24px">
            <h3 style="font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:600;margin-bottom:6px">{{ v.name }}</h3>
            <p style="color:#5C5476;font-size:14.5px;line-height:1.55">{{ v.desc }}</p>
            <span style="display:inline-flex;align-items:center;gap:6px;margin-top:16px;font-weight:600;font-size:14.5px;color:#5B47E0">Открыть вариант →</span>
          </div>
        </a>
      </sc-for>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      variants: [
        {letter:'A', name:'Modern', desc:'Светлый, фиолетовый акцент, стеклянные карточки и мягкие градиенты. Космический гротеск в заголовках.', href:'a.html', swatch:'linear-gradient(135deg,#EDE9FE,#7C5CFF)', letter:'A', letterColor:'#fff'},
        {letter:'B', name:'Dark', desc:'Тёмная тема, неоновое сияние и электрический фиолет. Строгий современный tech-вид.', href:'b.html', swatch:'linear-gradient(135deg,#1A1036,#8B6BFF)', letter:'B', letterColor:'#fff'},
        {letter:'C', name:'Editorial', desc:'Минимализм, тёплый фон, антиква Newsreader и много воздуха. Спокойный премиальный тон.', href:'c.html', swatch:'linear-gradient(135deg,#F1EEE7,#D8D2C5)', letter:'C', letterColor:'#5B47E0'},
      ],
    };
  }
}
</script>
</body>
</html>
